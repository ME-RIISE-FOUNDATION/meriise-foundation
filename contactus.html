<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            width: 50%;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
        }
        label {
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #218838;
        }
        .contact-info {
            text-align: center;
            margin-top: 20px;
        }
        .contact-info p {
            font-size: 16px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Contact Us</h2>
        <form method="POST" action="submit_form.php" onsubmit="return handleSubmit(event)">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="program_interest">Program Interest:</label>
            <input type="text" id="program_interest" name="program_interest" required>
            
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            
            <button type="submit" id="submit-btn">Send Message</button>
            <div id="form-message"></div>
        </form>

        <script>
        function handleSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const formMessage = document.getElementById('form-message');
            const form = event.target;
            
            // Disable button during submission
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            
            // Submit form via AJAX
            const formData = new FormData(form);
            
            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            })
            .then(response => {
                if (response.ok) {
                    // Clear form
                    form.reset();
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send Message';
                    
                    // Show success message
                    formMessage.style.color = '#28a745';
                    formMessage.style.fontSize = '16px';
                    formMessage.style.marginTop = '15px';
                    formMessage.innerHTML = '<strong>✓ Message sent successfully!</strong><br>We will get back to you soon.';
                    
                    // Clear message after 5 seconds
                    setTimeout(() => {
                        formMessage.innerHTML = '';
                    }, 5000);
                } else {
                    throw new Error('Network response was not ok');
                }
            })
            .catch(error => {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
                
                formMessage.style.color = '#dc3545';
                formMessage.style.fontSize = '16px';
                formMessage.style.marginTop = '15px';
                formMessage.innerHTML = '<strong>✗ Error sending message.</strong><br>Please try again or contact us directly.';
            });
            
            return false;
        }
        </script>
        <div class="contact-info">
            <h3>Our Contact Details</h3>
            <p><strong>ME-RIISE Foundation</strong></p>
            <p>Salgame Road, Hassan, Karnataka</p>
            <p>Email: ceomeriise@mcehassan.ac.in</p>
            <p>Phone: +91 9448179074</p>
        </div>
    </div>
</body>
</html>
